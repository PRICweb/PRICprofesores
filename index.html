<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIC - Panel de Profesores y Agenda</title>
    <style>
        :root {
            --bg-dark: #1b1e25;
            --panel-grey: #262931; /* Gris de los paneles de la imagen */
            --input-black: #000000;
            --blue-accent: #2c63eb; /* Azul exclusivo para botones */
            --text-main: #ffffff;
            --text-muted: #a3b8cc;
            --border-color: #333333;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .view {
            display: none;
        }
        .view.active {
            display: block;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .greeting {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .greeting span {
            color: var(--text-main); /* Se sacó el azul del texto */
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .icon-btn:hover {
            color: var(--text-main);
        }

        /* Tarjetas: Ahora son grises */
        .card {
            background: var(--panel-grey);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.2rem;
            border-bottom: 1px dashed rgba(255,255,255,0.2);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #fff; }
        
        /* Zonas a completar: Negro Absoluto */
        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--input-black);
            color: white;
            box-sizing: border-box;
            outline: none;
        }
        input::placeholder { color: rgba(255,255,255,0.4); }

        /* Botones: Los únicos con color azul */
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        
        .btn-primary { 
            background-color: var(--blue-accent); 
        }
        
        .btn-agenda { 
            background-color: var(--blue-accent); 
            width: 100%; 
            margin-bottom: 20px; 
            font-size: 1.1rem; 
            padding: 15px;
        }

        .btn-secondary { 
            background-color: var(--panel-grey); 
            border: 1px solid #555; 
        }

        /* Botones de acción menores (aceptar/rechazar) también en azul o gris para no romper la regla */
        .btn-action {
            background-color: var(--blue-accent);
            padding: 8px 12px;
        }

        /* Agenda Diaria */
        .agenda-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--input-black);
            padding: 10px 20px;
            border-radius: 8px 8px 0 0;
            border: 1px solid var(--border-color);
            border-bottom: none;
        }

        .calendar-wrapper {
            background-color: var(--input-black);
            border-radius: 0 0 8px 8px;
            border: 1px solid var(--border-color);
            display: none;
        }

        .calendar {
            display: grid;
            grid-template-columns: 80px 1fr;
            border-top: 1px solid var(--border-color);
        }

        .cal-header {
            background-color: var(--panel-grey);
            padding: 10px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .cal-time {
            padding: 10px 5px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .cal-cell {
            border-bottom: 1px solid var(--border-color);
            min-height: 60px;
            position: relative;
            padding: 5px;
        }

        /* Bloques de clase ahora son grises */
        .class-block {
            background-color: var(--panel-grey);
            border-left: 4px solid #555;
            border-radius: 4px;
            padding: 8px;
            font-size: 0.85rem;
            height: calc(100% - 10px);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 4px;
            color: white;
            border-top: 1px solid #3a3f4b;
            border-right: 1px solid #3a3f4b;
            border-bottom: 1px solid #1a1c23;
        }
        .class-block strong { font-size: 0.9rem; }
        .class-block .club { color: #d1d5db; }
        .class-block .alumnos { color: #9ca3af; font-style: italic; }

        .list-item {
            background-color: var(--input-black);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-details p { margin: 5px 0; font-size: 0.95rem; }
        .item-actions { display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="view-agenda" class="view active">
        <header>
            <div class="greeting">Hola, <span class="headerName">Profesor</span></div>
            <div class="header-actions">
                <button class="icon-btn" onclick="switchView('view-config')" title="Configuración">⚙️</button>
            </div>
        </header>

        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
            <button class="btn-primary" onclick="toggleFormClase()">+ Crear Nueva Clase Fija</button>
        </div>

        <div id="form-crear-clase" class="card" style="display: none;">
            <h2>Configurar Nueva Clase Fija</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Tipo de Clase</label>
                    <select id="claseTipo">
                        <option value="Individual">Individual</option>
                        <option value="Grupal">Grupal</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Categoría</label>
                    <select id="claseCategoria">
                        <option value="8va">8va</option>
                        <option value="7ma">7ma</option>
                        <option value="6ta">6ta</option>
                        <option value="5ta">5ta</option>
                        <option value="4ta">4ta</option>
                        <option value="3ra">3ra</option>
                        <option value="2da">2da</option>
                        <option value="1ra">1ra</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Club</label>
                    <select id="claseClub">
                        <option value="Orbit">Orbit</option>
                        <option value="Padel Pro Norte">Padel Pro Norte</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Día de la Semana</label>
                    <select id="claseDia">
                        <option value="Lunes">Lunes</option>
                        <option value="Martes">Martes</option>
                        <option value="Miércoles">Miércoles</option>
                        <option value="Jueves">Jueves</option>
                        <option value="Viernes">Viernes</option>
                        <option value="Sábado">Sábado</option>
                        <option value="Domingo">Domingo</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Horario</label>
                    <select id="claseHora">
                        <option value="08:00">08:00</option>
                        <option value="09:00">09:00</option>
                        <option value="10:00">10:00</option>
                        <option value="11:00">11:00</option>
                        <option value="12:00">12:00</option>
                        <option value="13:00">13:00</option>
                        <option value="14:00">14:00</option>
                        <option value="15:00">15:00</option>
                        <option value="16:00">16:00</option>
                        <option value="17:00">17:00</option>
                        <option value="18:00">18:00</option>
                        <option value="19:00">19:00</option>
                        <option value="20:00">20:00</option>
                        <option value="21:00">21:00</option>
                        <option value="22:00">22:00</option>
                    </select>
                </div>
            </div>
            <button class="btn-primary" onclick="crearClase()">Publicar Clase</button>
            <button class="btn-secondary" onclick="toggleFormClase()">Cancelar</button>
        </div>

        <button class="btn-agenda" onclick="toggleAgenda()">Ver Agenda</button>

        <div id="contenedor-agenda" style="display: none;">
            <div class="agenda-nav">
                <button class="btn-secondary" onclick="cambiarDia(-1)">◄ Anterior</button>
                <h3 id="label-dia" style="margin: 0; color: white;">Día</h3>
                <button class="btn-secondary" onclick="cambiarDia(1)">Siguiente ►</button>
            </div>
            <div class="calendar-wrapper" style="display: block;">
                <div class="calendar" id="calendar-grid">
                    </div>
            </div>
        </div>

        <div class="card" style="margin-top: 30px;">
            <h2>Solicitudes Pendientes</h2>
            <div id="listaSolicitudes"></div>
        </div>
    </div>

    <div id="view-config" class="view">
        <header>
            <div class="greeting">Configuración</div>
            <div class="header-actions">
                <button class="btn-secondary" onclick="switchView('view-agenda')">Volver</button>
            </div>
        </header>

        <div class="card">
            <h2>Datos del Perfil</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="profNombre" placeholder="Ej: Juan">
                </div>
                <div class="form-group">
                    <label>Apellido</label>
                    <input type="text" id="profApellido" placeholder="Ej: Pérez">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Tarifa Clase Individual ($)</label>
                    <input type="number" id="precioInd" placeholder="Ej: 5000">
                </div>
                <div class="form-group">
                    <label>Tarifa Clase Grupal ($)</label>
                    <input type="number" id="precioGrup" placeholder="Ej: 3000">
                </div>
            </div>
            <button class="btn-primary" onclick="guardarPerfil()">Guardar Cambios</button>
        </div>
    </div>

</div>

<script>
    let perfil = JSON.parse(localStorage.getItem('profPerfil')) || { nombre: '', apellido: '', precioInd: '', precioGrup: '' };
    let clases = JSON.parse(localStorage.getItem('profClasesFijas')) || [];
    let solicitudes = JSON.parse(localStorage.getItem('profSolicitudes')) || [
        { id: 1, alumno: 'Carlos', tipo: 'Grupal', dia: 'Martes', hora: '18:00', estado: 'Pendiente' }
    ];

    const nombresDias = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
    let diaActualIndex = new Date().getDay(); 

    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
    }

    function toggleFormClase() {
        const form = document.getElementById('form-crear-clase');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    function toggleAgenda() {
        const agenda = document.getElementById('contenedor-agenda');
        agenda.style.display = agenda.style.display === 'none' ? 'block' : 'none';
        renderizarCalendario();
    }

    function cargarPerfil() {
        document.getElementById('profNombre').value = perfil.nombre;
        document.getElementById('profApellido').value = perfil.apellido;
        document.getElementById('precioInd').value = perfil.precioInd;
        document.getElementById('precioGrup').value = perfil.precioGrup;
        document.querySelectorAll('.headerName').forEach(el => el.innerText = perfil.nombre || 'Profesor');
    }

    function guardarPerfil() {
        perfil = {
            nombre: document.getElementById('profNombre').value,
            apellido: document.getElementById('profApellido').value,
            precioInd: document.getElementById('precioInd').value,
            precioGrup: document.getElementById('precioGrup').value,
        };
        localStorage.setItem('profPerfil', JSON.stringify(perfil));
        cargarPerfil();
        switchView('view-agenda');
    }

    function cambiarDia(offset) {
        diaActualIndex = (diaActualIndex + offset + 7) % 7;
        renderizarCalendario();
    }

    function renderizarCalendario() {
        const diaNombre = nombresDias[diaActualIndex];
        document.getElementById('label-dia').innerText = diaNombre;
        
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = `
            <div class="cal-header">Hora</div>
            <div class="cal-header">Clase Fija</div>
        `;
        
        const horas = ['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00','22:00'];

        horas.forEach(hora => {
            grid.innerHTML += `<div class="cal-time">${hora}</div>`;
            
            let claseEncontrada = clases.find(c => c.dia === diaNombre && c.hora === hora);
            let contenidoCelda = '';

            if(claseEncontrada) {
                let alumnosText = claseEncontrada.alumnos.length > 0 
                                  ? claseEncontrada.alumnos.join(', ') 
                                  : 'Libre / Sin alumnos';

                contenidoCelda = `
                    <div class="class-block">
                        <strong>${claseEncontrada.tipo} - ${claseEncontrada.categoria}</strong>
                        <span class="club">Sede: ${claseEncontrada.club}</span>
                        <span class="alumnos">Alumnos: ${alumnosText}</span>
                    </div>
                `;
            }

            grid.innerHTML += `<div class="cal-cell">${contenidoCelda}</div>`;
        });
    }

    function crearClase() {
        const tipo = document.getElementById('claseTipo').value;
        const categoria = document.getElementById('claseCategoria').value;
        const club = document.getElementById('claseClub').value;
        const dia = document.getElementById('claseDia').value;
        const hora = document.getElementById('claseHora').value;

        if(clases.some(c => c.dia === dia && c.hora === hora)) {
            alert('Ya tenés una clase fija asignada en ese día y horario.');
            return;
        }

        clases.push({ id: Date.now(), tipo, categoria, club, dia, hora, alumnos: [] });
        localStorage.setItem('profClasesFijas', JSON.stringify(clases));
        
        renderizarCalendario();
        toggleFormClase();
    }

    function renderizarSolicitudes() {
        const contenedor = document.getElementById('listaSolicitudes');
        contenedor.innerHTML = '';
        const pendientes = solicitudes.filter(s => s.estado === 'Pendiente');

        if(pendientes.length === 0) {
            contenedor.innerHTML = '<p style="color: var(--text-muted)">No hay solicitudes pendientes.</p>';
            return;
        }

        pendientes.forEach(sol => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `
                <div class="item-details">
                    <p><strong>${sol.alumno}</strong></p>
                    <p>Solicita clase ${sol.tipo} los ${sol.dia} a las ${sol.hora}</p>
                </div>
                <div class="item-actions">
                    <button class="btn-action" onclick="gestionarSolicitud(${sol.id}, 'Aceptada')">Aceptar</button>
                    <button class="btn-action" style="background-color: #555;" onclick="gestionarSolicitud(${sol.id}, 'Rechazada')">Rechazar</button>
                </div>
            `;
            contenedor.appendChild(div);
        });
    }

    function gestionarSolicitud(id, estado) {
        let solicitud = solicitudes.find(s => s.id === id);
        if(solicitud && estado === 'Aceptada') {
            let claseExistente = clases.find(c => c.dia === solicitud.dia && c.hora === solicitud.hora);
            if(claseExistente) {
                if(!claseExistente.alumnos.includes(solicitud.alumno)){
                    claseExistente.alumnos.push(solicitud.alumno);
                }
            } else {
                clases.push({
                    id: Date.now(), tipo: solicitud.tipo, categoria: 'N/A', club: 'A confirmar',
                    dia: solicitud.dia, hora: solicitud.hora, alumnos: [solicitud.alumno]
                });
            }
            localStorage.setItem('profClasesFijas', JSON.stringify(clases));
            if(document.getElementById('contenedor-agenda').style.display === 'block') {
                renderizarCalendario();
            }
        }
        solicitudes = solicitudes.filter(s => s.id !== id);
        localStorage.setItem('profSolicitudes', JSON.stringify(solicitudes));
        renderizarSolicitudes();
    }

    cargarPerfil();
    renderizarSolicitudes();

</script>
</body>
</html>

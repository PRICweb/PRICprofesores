<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIC - Panel de Profesores y Agenda</title>
    <style>
        :root {
            --bg-main: #1b1e25;
            --bg-panel: #262931;
            --bg-calendar: #17191f;
            --border-color: #2f333d;
            --border-dashed: #3a3f4b;
            --text-main: #ffffff;
            --text-muted: #8b95a5;
            --blue-accent: #3b82f6; 
            --success: #10b981;
            --danger: #ef4444;
            
            /* Colores de las clases basados en la imagen */
            --class-empty-bg: #fca5a5; /* Naranja/Amarillo */
            --class-empty-bg: #fbb146;
            --class-empty-border: #d97706;
            --class-full-bg: #41d39c; /* Verde Menta */
            --class-full-border: #059669;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { max-width: 800px; width: 100%; position: relative; }
        .view { display: none; }
        .view.active { display: block; }

        /* --- Header --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        .greeting { font-size: 1.5rem; font-weight: bold; }
        .greeting span { color: var(--blue-accent); }
        .header-actions { display: flex; align-items: center; gap: 15px; }
        .icon-btn {
            background: none; border: none; color: var(--text-muted);
            font-size: 1.5rem; cursor: pointer; transition: color 0.2s;
        }
        .icon-btn:hover { color: var(--text-main); }

        /* --- Modales --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background-color: var(--bg-panel); padding: 20px; border-radius: 8px;
            width: 90%; max-width: 450px; border: 1px solid var(--border-color);
            position: relative;
        }
        .close-modal {
            position: absolute; top: 10px; right: 15px; background: none;
            border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer;
        }
        .close-modal:hover { color: white; }

        /* --- Formularios --- */
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-muted); }
        input, select {
            width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border-color);
            background-color: var(--bg-main); color: white; box-sizing: border-box; outline: none;
        }
        
        button { font-family: inherit; cursor: pointer; }
        .btn-primary { background-color: var(--blue-accent); color: white; padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; width: 100%; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary { background-color: transparent; color: white; border: 1px solid var(--border-color); padding: 10px 20px; border-radius: 6px; width: 100%; margin-top: 10px;}
        .btn-danger { background-color: var(--danger); color: white; border: none; padding: 10px 20px; border-radius: 6px; width: 100%; margin-top: 10px;}

        /* --- Agenda Navegación --- */
        .calendar-nav {
            display: flex; justify-content: space-between; align-items: center;
            background-color: var(--bg-panel); padding: 12px 20px; border-radius: 8px 8px 0 0;
            border: 1px solid var(--border-color); margin-top: 15px;
        }
        .nav-arrows { display: flex; align-items: center; gap: 20px; }
        .nav-arrows h3 { margin: 0; font-size: 1.1rem; min-width: 100px; text-align: center; }
        .nav-arrows button { background: none; border: none; color: white; font-size: 1.2rem; }
        .nav-actions { display: flex; gap: 10px; }
        .btn-sm { padding: 6px 12px; border-radius: 4px; font-size: 0.85rem; border: none; color: white; }
        .btn-active { background-color: var(--blue-accent); }

        /* --- Grilla del Calendario --- */
        .calendar-container {
            background-color: var(--bg-calendar); border: 1px solid var(--border-color);
            border-top: none; border-radius: 0 0 8px 8px;
        }
        .cal-header-row {
            display: flex; border-bottom: 1px solid var(--border-color); background-color: var(--bg-panel);
        }
        .cal-time-col { width: 60px; border-right: 1px solid var(--border-color); }
        .cal-main-col { flex: 1; text-align: center; padding: 10px; }
        .cal-main-col strong { display: block; font-size: 0.95rem; }

        .hour-row { display: flex; height: 60px; } /* Cada slot es de 60px = 60 minutos */
        .hour-label {
            width: 60px; text-align: center; padding-top: 5px; font-size: 0.8rem;
            color: var(--text-muted); border-right: 1px dashed var(--border-dashed);
            border-bottom: 1px dashed var(--border-dashed); box-sizing: border-box;
        }
        .hour-slot {
            flex: 1; border-bottom: 1px dashed var(--border-dashed);
            position: relative; cursor: pointer; transition: background 0.2s;
        }
        .hour-slot:hover { background-color: rgba(255,255,255,0.02); }

        /* --- Bloques de Clase en la grilla --- */
        .class-block {
            position: absolute; left: 0; right: 0; top: 0;
            border-radius: 4px; padding: 6px 10px; font-size: 0.85rem;
            box-sizing: border-box; cursor: pointer; z-index: 10;
            color: #111827; /* Texto oscuro para contrastar con el amarillo/verde */
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; justify-content: flex-start;
        }
        .class-block:hover { filter: brightness(1.05); }
        .class-block strong { font-size: 0.95rem; display: block; margin-bottom: 2px;}
        
        .class-empty { background-color: var(--class-empty-bg); border-left: 5px solid var(--class-empty-border); }
        .class-full { background-color: var(--class-full-bg); border-left: 5px solid var(--class-full-border); }

        /* --- Lista de alumnos en modal --- */
        .alumno-item {
            background-color: var(--bg-main); padding: 10px; border-radius: 6px;
            border: 1px solid var(--border-color); margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .alumno-item p { margin: 0; font-size: 0.9rem; }
        .alumno-item small { color: var(--text-muted); }
    </style>
</head>
<body>

<div class="container">
    
    <div id="view-agenda" class="view active">
        <header>
            <div class="greeting">Hola,<br><span class="headerName">Admin</span></div>
            <div class="header-actions">
                <button class="icon-btn" title="Métricas">📊</button>
                <button class="icon-btn" onclick="switchView('view-config')" title="Configuración">⚙️</button>
            </div>
        </header>

        <div class="calendar-nav">
            <div class="nav-arrows">
                <button onclick="cambiarDia(-1)">❮</button>
                <h3 id="label-dia">HOY</h3>
                <button onclick="cambiarDia(1)">❯</button>
            </div>
            <div class="nav-actions">
                <button class="btn-sm btn-active" onclick="irAHoy()">Hoy</button>
                <button class="btn-sm btn-active">📅 Calendario</button>
            </div>
        </div>

        <div class="calendar-container">
            <div class="cal-header-row">
                <div class="cal-time-col"></div>
                <div class="cal-main-col"><strong>Cancha 1</strong></div>
            </div>
            <div id="calendar-grid">
                </div>
        </div>
    </div>

    <div id="view-config" class="view">
        <header>
            <div class="greeting">Configuración</div>
            <div class="header-actions">
                <button class="btn-secondary" style="margin:0; width:auto;" onclick="switchView('view-agenda')">Volver</button>
            </div>
        </header>
        </div>
</div>

<div class="modal-overlay" id="modal-crear">
    <div class="modal-content">
        <button class="close-modal" onclick="cerrarModal('modal-crear')">×</button>
        <h2 style="margin-top:0;">Crear Nueva Clase</h2>
        
        <div class="form-row">
            <div class="form-group">
                <label>Tipo</label>
                <select id="claseTipo"><option>Individual</option><option>Grupal</option></select>
            </div>
            <div class="form-group">
                <label>Categoría</label>
                <select id="claseCategoria">
                    <option>8va</option><option>7ma</option><option>6ta</option><option>5ta</option><option>4ta</option><option>3ra</option><option>2da</option><option>1ra</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Horario Inicio</label>
                <input type="text" id="claseHora" disabled style="background-color: var(--bg-panel); color: var(--text-muted);">
            </div>
            <div class="form-group">
                <label>Duración</label>
                <select id="claseDuracion">
                    <option value="60">1 hora</option>
                    <option value="90" selected>1 hora y media</option>
                    <option value="120">2 horas</option>
                </select>
            </div>
        </div>
        <button class="btn-primary" onclick="guardarNuevaClase()">Guardar Clase</button>
        <button class="btn-secondary" onclick="cerrarModal('modal-crear')">Cancelar</button>
    </div>
</div>

<div class="modal-overlay" id="modal-detalle">
    <div class="modal-content">
        <button class="close-modal" onclick="cerrarModal('modal-detalle')">×</button>
        <h2 style="margin-top:0;" id="detalleTitulo">Detalles de Clase</h2>
        
        <div id="listaAlumnosContainer" style="margin-bottom: 20px;">
            <h3 style="font-size: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 5px;">Alumnos Inscriptos</h3>
            <div id="listaAlumnosRender"></div>
        </div>

        <div style="background-color: var(--bg-main); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color);">
            <h3 style="font-size: 1rem; margin-top: 0;">Agregar Alumno Manualmente</h3>
            <div class="form-row">
                <div class="form-group"><input type="text" id="alumNombre" placeholder="Nombre"></div>
                <div class="form-group"><input type="text" id="alumApellido" placeholder="Apellido"></div>
            </div>
            <div class="form-group" style="margin-bottom: 10px;">
                <input type="text" id="alumWsp" placeholder="WhatsApp (Ej: +549...)">
            </div>
            <button class="btn-primary" onclick="agregarAlumnoAClaseActual()">+ Inscribir Alumno</button>
        </div>
        
        <button class="btn-danger" onclick="eliminarClaseActual()">Eliminar Clase</button>
    </div>
</div>

<script>
    let clases = JSON.parse(localStorage.getItem('profClasesTurnos')) || [];
    let claseSeleccionadaId = null;
    let fechaMostrada = new Date();
    const nombresDias = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];

    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
    }

    /* --- GESTIÓN DE MODALES --- */
    function abrirModalCrear(horaStr) {
        document.getElementById('claseHora').value = horaStr;
        document.getElementById('modal-crear').style.display = 'flex';
    }

    function cerrarModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
        claseSeleccionadaId = null;
    }

    /* --- GESTIÓN DEL CALENDARIO --- */
    function cambiarDia(offset) {
        fechaMostrada.setDate(fechaMostrada.getDate() + offset);
        renderizarCalendario();
    }

    function irAHoy() {
        fechaMostrada = new Date();
        renderizarCalendario();
    }

    function renderizarCalendario() {
        const hoy = new Date();
        const esHoy = fechaMostrada.toDateString() === hoy.toDateString();
        const diaNombre = nombresDias[fechaMostrada.getDay()];
        const fechaFormat = fechaMostrada.toISOString().split('T')[0];
        
        document.getElementById('label-dia').innerText = esHoy ? 'HOY' : diaNombre.toUpperCase();
        
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        
        const horas = ['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00','22:00'];

        horas.forEach(hora => {
            // Fila de la hora base
            let divFila = document.createElement('div');
            divFila.className = 'hour-row';
            
            // Label de la hora
            let divLabel = document.createElement('div');
            divLabel.className = 'hour-label';
            divLabel.innerText = hora;
            
            // Slot donde van las clases
            let divSlot = document.createElement('div');
            divSlot.className = 'hour-slot';
            divSlot.onclick = () => abrirModalCrear(hora); // Click para crear clase
            
            // Buscar si hay clases que empiecen en este horario exacto
            let clasesEnEstaHora = clases.filter(c => c.fecha === fechaFormat && c.hora === hora);
            
            clasesEnEstaHora.forEach(clase => {
                let divClase = document.createElement('div');
                let estaLlena = clase.alumnos && clase.alumnos.length > 0;
                
                divClase.className = `class-block ${estaLlena ? 'class-full' : 'class-empty'}`;
                // Altura proporcional: 60px por hora. Si es 90 min -> 90px
                divClase.style.height = `${clase.duracion}px`;
                
                divClase.innerHTML = `
                    <strong>${clase.tipo} - ${clase.categoria}</strong>
                    <span>${clase.hora} hs</span>
                    <span style="margin-top: auto; font-weight: bold;">Pago: Pend</span>
                `;
                
                // Detener propagación para no abrir el modal de creación al clickear la clase
                divClase.onclick = (e) => {
                    e.stopPropagation();
                    abrirDetalleClase(clase.id);
                };
                
                divSlot.appendChild(divClase);
            });

            divFila.appendChild(divLabel);
            divFila.appendChild(divSlot);
            grid.appendChild(divFila);
        });
    }

    /* --- LÓGICA DE CLASES --- */
    function guardarNuevaClase() {
        const fechaFormat = fechaMostrada.toISOString().split('T')[0];
        const nuevaClase = {
            id: Date.now(),
            fecha: fechaFormat,
            hora: document.getElementById('claseHora').value,
            tipo: document.getElementById('claseTipo').value,
            categoria: document.getElementById('claseCategoria').value,
            duracion: parseInt(document.getElementById('claseDuracion').value),
            alumnos: []
        };
        
        clases.push(nuevaClase);
        localStorage.setItem('profClasesTurnos', JSON.stringify(clases));
        renderizarCalendario();
        cerrarModal('modal-crear');
    }

    function abrirDetalleClase(id) {
        claseSeleccionadaId = id;
        const clase = clases.find(c => c.id === id);
        
        document.getElementById('detalleTitulo').innerText = `${clase.tipo} - ${clase.hora} hs`;
        renderizarAlumnosDeClase(clase);
        
        document.getElementById('modal-detalle').style.display = 'flex';
    }

    function renderizarAlumnosDeClase(clase) {
        const container = document.getElementById('listaAlumnosRender');
        container.innerHTML = '';
        
        if (!clase.alumnos || clase.alumnos.length === 0) {
            container.innerHTML = '<p style="color: var(--text-muted); font-size: 0.9rem;">No hay alumnos inscriptos aún.</p>';
            return;
        }

        clase.alumnos.forEach((alum, index) => {
            container.innerHTML += `
                <div class="alumno-item">
                    <div>
                        <p><strong>${alum.nombre} ${alum.apellido}</strong></p>
                        <small>📱 ${alum.whatsapp}</small>
                    </div>
                    <button class="icon-btn" onclick="quitarAlumno(${index})" title="Quitar alumno" style="font-size: 1.2rem;">🗑️</button>
                </div>
            `;
        });
    }

    function agregarAlumnoAClaseActual() {
        if (!claseSeleccionadaId) return;
        
        const nombre = document.getElementById('alumNombre').value;
        const apellido = document.getElementById('alumApellido').value;
        const whatsapp = document.getElementById('alumWsp').value;

        if (!nombre || !apellido || !whatsapp) {
            alert('Por favor completá nombre, apellido y WhatsApp.');
            return;
        }

        let claseIndex = clases.findIndex(c => c.id === claseSeleccionadaId);
        clases[claseIndex].alumnos.push({ nombre, apellido, whatsapp });
        
        localStorage.setItem('profClasesTurnos', JSON.stringify(clases));
        
        // Limpiar inputs
        document.getElementById('alumNombre').value = '';
        document.getElementById('alumApellido').value = '';
        document.getElementById('alumWsp').value = '';
        
        renderizarAlumnosDeClase(clases[claseIndex]);
        renderizarCalendario(); // Para actualizar el color (de amarillo a verde)
    }

    function quitarAlumno(alumnoIndex) {
        let claseIndex = clases.findIndex(c => c.id === claseSeleccionadaId);
        clases[claseIndex].alumnos.splice(alumnoIndex, 1);
        localStorage.setItem('profClasesTurnos', JSON.stringify(clases));
        renderizarAlumnosDeClase(clases[claseIndex]);
        renderizarCalendario();
    }

    function eliminarClaseActual() {
        if(confirm('¿Estás seguro de que querés eliminar esta clase?')) {
            clases = clases.filter(c => c.id !== claseSeleccionadaId);
            localStorage.setItem('profClasesTurnos', JSON.stringify(clases));
            cerrarModal('modal-detalle');
            renderizarCalendario();
        }
    }

    // Inicializar
    renderizarCalendario();

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIC - Panel de Profesores y Agenda</title>
    <style>
        :root {
            --bg-dark: #1b1e25;
            --bg-darker: #13151a;
            --card-blue: #2c63eb;
            --card-blue-light: #4477f1;
            --text-main: #ffffff;
            --text-muted: #a3b8cc;
            --border-color: #2a2e39;
            --success: #10b981;
            --danger: #ef4444;
            --accent: #f59e0b;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        /* Sistema de Vistas */
        .view {
            display: none;
        }
        .view.active {
            display: block;
        }

        /* Cabecera */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .greeting {
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .greeting span {
            color: #60a5fa;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .profile-pic-mini {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--card-blue);
            background-size: cover;
            background-position: center;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .icon-btn:hover {
            color: var(--text-main);
        }

        /* Tarjetas y Formularios */
        .card {
            background: linear-gradient(180deg, var(--card-blue) 0%, #1e4bb5 100%);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.2rem;
            border-bottom: 1px dashed rgba(255,255,255,0.3);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-muted); }
        
        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background-color: rgba(0,0,0,0.2);
            color: white;
            box-sizing: border-box;
            outline: none;
        }
        input::placeholder { color: rgba(255,255,255,0.4); }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }
        button:hover { opacity: 0.9; }
        .btn-primary { background-color: var(--accent); color: #000; }
        .btn-secondary { background-color: rgba(255,255,255,0.2); color: white; }
        .btn-success { background-color: var(--success); }
        .btn-danger { background-color: var(--danger); }

        /* Agenda - Calendario */
        .agenda-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .calendar-wrapper {
            background-color: var(--bg-darker);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            overflow-x: auto;
        }

        .calendar {
            display: grid;
            grid-template-columns: 60px repeat(7, minmax(120px, 1fr));
            border-top: 1px solid var(--border-color);
            border-left: 1px solid var(--border-color);
            min-width: 800px;
        }

        .cal-header {
            background-color: rgba(255,255,255,0.05);
            padding: 10px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .cal-time {
            padding: 10px 5px;
            text-align: right;
            font-size: 0.8rem;
            color: var(--text-muted);
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .cal-cell {
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            min-height: 60px;
            position: relative;
            padding: 2px;
        }

        /* Bloque de Clase en Agenda */
        .class-block {
            background-color: var(--card-blue);
            border-left: 4px solid var(--accent);
            border-radius: 4px;
            padding: 5px;
            font-size: 0.75rem;
            height: calc(100% - 4px);
            box-sizing: border-box;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .class-block strong { font-size: 0.8rem; }
        .class-block .club { color: #93c5fd; }
        .class-block .alumnos { color: #fde68a; font-style: italic; }

        /* Lista de Solicitudes */
        .list-item {
            background-color: rgba(0,0,0,0.15);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-details p { margin: 5px 0; font-size: 0.95rem; }
        .item-actions { display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="view-agenda" class="view active">
        <header>
            <div class="greeting">👋 Hola, <span class="headerName">Profesor</span></div>
            <div class="header-actions">
                <div class="profile-pic-mini headerPic"></div>
                <button class="icon-btn" onclick="switchView('view-config')" title="Configuración">⚙️</button>
            </div>
        </header>

        <div class="agenda-controls">
            <button class="btn-primary" onclick="toggleFormClase()">+ Crear Nueva Clase</button>
            <h3 style="margin: 0;" id="semanaRango">Mi Agenda</h3>
        </div>

        <div id="form-crear-clase" class="card" style="display: none;">
            <h2>🎾 Configurar Nueva Clase</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Tipo de Clase</label>
                    <select id="claseTipo">
                        <option value="Individual">Individual</option>
                        <option value="Grupal">Grupal</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Categoría</label>
                    <select id="claseCategoria">
                        <option value="Iniciación">Iniciación (7ma/8va)</option>
                        <option value="Intermedio">Intermedio (5ta/6ta)</option>
                        <option value="Avanzado">Avanzado (3ra/4ta)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Club</label>
                    <input type="text" id="claseClub" placeholder="Ej: Padel Pro">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Fecha</label>
                    <input type="date" id="claseFecha">
                </div>
                <div class="form-group">
                    <label>Horario</label>
                    <select id="claseHora">
                        <option value="08:00">08:00</option>
                        <option value="09:00">09:00</option>
                        <option value="10:00">10:00</option>
                        <option value="11:00">11:00</option>
                        <option value="12:00">12:00</option>
                        <option value="13:00">13:00</option>
                        <option value="14:00">14:00</option>
                        <option value="15:00">15:00</option>
                        <option value="16:00">16:00</option>
                        <option value="17:00">17:00</option>
                        <option value="18:00">18:00</option>
                        <option value="19:00">19:00</option>
                        <option value="20:00">20:00</option>
                        <option value="21:00">21:00</option>
                        <option value="22:00">22:00</option>
                    </select>
                </div>
            </div>
            <button class="btn-primary" onclick="crearClase()">Publicar Clase</button>
            <button class="btn-secondary" onclick="toggleFormClase()">Cancelar</button>
        </div>

        <div class="calendar-wrapper">
            <div class="calendar" id="calendar-grid">
                </div>
        </div>

        <div class="card" style="margin-top: 30px;">
            <h2>📩 Solicitudes Pendientes</h2>
            <div id="listaSolicitudes">
                </div>
        </div>
    </div>


    <div id="view-config" class="view">
        <header>
            <div class="greeting">⚙️ Configuración</div>
            <div class="header-actions">
                <button class="btn-secondary" onclick="switchView('view-agenda')">Volver a la Agenda</button>
                <div class="profile-pic-mini headerPic"></div>
            </div>
        </header>

        <div class="card">
            <h2>Datos del Perfil</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="profNombre" placeholder="Ej: Juan">
                </div>
                <div class="form-group">
                    <label>Apellido</label>
                    <input type="text" id="profApellido" placeholder="Ej: Pérez">
                </div>
            </div>
            <div class="form-group">
                <label>URL de Foto de Perfil</label>
                <input type="text" id="profFoto" placeholder="https://ejemplo.com/foto.jpg">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Tarifa Clase Individual ($)</label>
                    <input type="number" id="precioInd" placeholder="Ej: 5000">
                </div>
                <div class="form-group">
                    <label>Tarifa Clase Grupal ($)</label>
                    <input type="number" id="precioGrup" placeholder="Ej: 3000">
                </div>
            </div>
            <button class="btn-primary" onclick="guardarPerfil()">Guardar Cambios</button>
        </div>
    </div>

</div>

<script>
    // --- ESTADO DE LA APP ---
    let perfil = JSON.parse(localStorage.getItem('profPerfil')) || { nombre: '', apellido: '', foto: '', precioInd: '', precioGrup: '' };
    let clases = JSON.parse(localStorage.getItem('profClases')) || [];
    let solicitudes = JSON.parse(localStorage.getItem('profSolicitudes')) || [
        { id: 1, alumno: 'Carlos Tevez', tipo: 'Grupal', fecha: '2026-05-12', hora: '18:00', estado: 'Pendiente' },
        { id: 2, alumno: 'Pedro', tipo: 'Individual', fecha: '2026-05-14', hora: '09:00', estado: 'Pendiente' }
    ];
    let fechaActual = new Date('2026-05-10'); // Fecha forzada a hoy según contexto para coincidir con tus capturas.

    // --- NAVEGACIÓN ---
    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
    }

    function toggleFormClase() {
        const form = document.getElementById('form-crear-clase');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    // --- PERFIL ---
    function cargarPerfil() {
        document.getElementById('profNombre').value = perfil.nombre;
        document.getElementById('profApellido').value = perfil.apellido;
        document.getElementById('profFoto').value = perfil.foto;
        document.getElementById('precioInd').value = perfil.precioInd;
        document.getElementById('precioGrup').value = perfil.precioGrup;

        actualizarUIHeader();
    }

    function guardarPerfil() {
        perfil = {
            nombre: document.getElementById('profNombre').value,
            apellido: document.getElementById('profApellido').value,
            foto: document.getElementById('profFoto').value,
            precioInd: document.getElementById('precioInd').value,
            precioGrup: document.getElementById('precioGrup').value,
        };
        localStorage.setItem('profPerfil', JSON.stringify(perfil));
        actualizarUIHeader();
        alert('Perfil guardado');
        switchView('view-agenda');
    }

    function actualizarUIHeader() {
        document.querySelectorAll('.headerName').forEach(el => el.innerText = perfil.nombre || 'Profesor');
        if (perfil.foto) {
            document.querySelectorAll('.headerPic').forEach(el => el.style.backgroundImage = `url('${perfil.foto}')`);
        }
    }

    // --- CALENDARIO Y CLASES ---
    function obtenerDiasSemana() {
        let lunes = new Date(fechaActual);
        let dia = lunes.getDay() || 7; 
        if (dia !== 1) lunes.setHours(-24 * (dia - 1));
        
        let dias = [];
        let nombresDias = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];
        
        for (let i = 0; i < 7; i++) {
            let fecha = new Date(lunes);
            fecha.setDate(lunes.getDate() + i);
            dias.push({
                nombre: nombresDias[i],
                fechaStr: fecha.toISOString().split('T')[0],
                diaMes: fecha.getDate()
            });
        }
        return dias;
    }

    function renderizarCalendario() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        
        const diasSemana = obtenerDiasSemana();
        const horas = ['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00','22:00'];

        // Fila de Cabecera (Días)
        grid.innerHTML += `<div class="cal-header">Horario</div>`;
        diasSemana.forEach(dia => {
            grid.innerHTML += `<div class="cal-header">${dia.nombre} ${dia.diaMes}</div>`;
        });

        // Filas de Horas
        horas.forEach(hora => {
            // Celda de la hora
            grid.innerHTML += `<div class="cal-time">${hora}</div>`;
            
            // Celdas de los días para esa hora
            diasSemana.forEach(dia => {
                let idCelda = `${dia.fechaStr}-${hora}`;
                
                // Buscar si hay clase en este día y hora
                let claseEncontrada = clases.find(c => c.fecha === dia.fechaStr && c.hora === hora);
                let contenidoCelda = '';

                if(claseEncontrada) {
                    let alumnosText = claseEncontrada.alumnos.length > 0 
                                      ? claseEncontrada.alumnos.join(', ') 
                                      : 'Libre / Sin alumnos';

                    contenidoCelda = `
                        <div class="class-block">
                            <strong>${claseEncontrada.tipo}</strong>
                            <span class="club">📍 ${claseEncontrada.club}</span>
                            <span>🕒 ${claseEncontrada.hora}</span>
                            <span class="alumnos">👤 ${alumnosText}</span>
                        </div>
                    `;
                }

                grid.innerHTML += `<div class="cal-cell" id="cell-${idCelda}">${contenidoCelda}</div>`;
            });
        });
    }

    function crearClase() {
        const tipo = document.getElementById('claseTipo').value;
        const categoria = document.getElementById('claseCategoria').value;
        const club = document.getElementById('claseClub').value || 'Sin especificar';
        const fecha = document.getElementById('claseFecha').value;
        const hora = document.getElementById('claseHora').value;

        if(!fecha || !hora) {
            alert('Completá la fecha y horario.');
            return;
        }

        clases.push({
            id: Date.now(),
            tipo, categoria, club, fecha, hora, alumnos: []
        });

        localStorage.setItem('profClases', JSON.stringify(clases));
        renderizarCalendario();
        toggleFormClase();
    }

    // --- SOLICITUDES ---
    function renderizarSolicitudes() {
        const contenedor = document.getElementById('listaSolicitudes');
        contenedor.innerHTML = '';
        const pendientes = solicitudes.filter(s => s.estado === 'Pendiente');

        if(pendientes.length === 0) {
            contenedor.innerHTML = '<p style="color: var(--text-muted)">No hay solicitudes pendientes.</p>';
            return;
        }

        pendientes.forEach(sol => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `
                <div class="item-details">
                    <p><strong>👤 ${sol.alumno}</strong></p>
                    <p>Solicita clase ${sol.tipo} el ${sol.fecha} - ${sol.hora}</p>
                </div>
                <div class="item-actions">
                    <button class="btn-success" onclick="gestionarSolicitud(${sol.id}, 'Aceptada')">Aceptar</button>
                    <button class="btn-danger" onclick="gestionarSolicitud(${sol.id}, 'Rechazada')">✗</button>
                </div>
            `;
            contenedor.appendChild(div);
        });
    }

    function gestionarSolicitud(id, estado) {
        let solicitud = solicitudes.find(s => s.id === id);
        if(solicitud) {
            solicitud.estado = estado;
            
            // Si se acepta, buscar si hay una clase creada en ese horario e inscribirlo
            if(estado === 'Aceptada') {
                let claseExistente = clases.find(c => c.fecha === solicitud.fecha && c.hora === solicitud.hora);
                if(claseExistente) {
                    if(!claseExistente.alumnos.includes(solicitud.alumno)){
                        claseExistente.alumnos.push(solicitud.alumno);
                    }
                } else {
                    // Si no hay clase en la agenda, la crea automáticamente
                    clases.push({
                        id: Date.now(),
                        tipo: solicitud.tipo,
                        categoria: 'General',
                        club: 'A confirmar',
                        fecha: solicitud.fecha,
                        hora: solicitud.hora,
                        alumnos: [solicitud.alumno]
                    });
                }
                localStorage.setItem('profClases', JSON.stringify(clases));
                renderizarCalendario();
            }
        }
        localStorage.setItem('profSolicitudes', JSON.stringify(solicitudes));
        renderizarSolicitudes();
    }

    // Inicializar App
    cargarPerfil();
    renderizarCalendario();
    renderizarSolicitudes();

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIC - Panel de Profesores y Agenda</title>
    <style>
        :root {
            --bg-main: #1b1e25;
            --bg-panel: #262931;
            --bg-calendar: #17191f;
            --border-color: #2f333d;
            --border-dashed: #3a3f4b;
            --text-main: #ffffff;
            --text-muted: #8b95a5;
            --blue-accent: #3b82f6; 
            --success: #10b981;
            --danger: #ef4444;
        }

        /* * Se aplica escala de grises en cumplimiento estricto con 
         * las preferencias de visualización establecidas para la sesión.
         */
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            filter: grayscale(100%); 
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .view { display: none; }
        .view.active { display: block; }

        /* --- Header --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        .greeting {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .greeting span { color: var(--blue-accent); }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .icon-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .icon-btn:hover { color: var(--text-main); }

        /* --- Acordeones --- */
        .accordion {
            background-color: var(--bg-panel);
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }
        .accordion summary {
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .accordion summary::-webkit-details-marker { display: none; }
        .accordion summary::after {
            content: '▼';
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .accordion[open] summary::after { content: '▲'; }
        
        .accordion-content {
            padding: 15px;
            border-top: 1px solid var(--border-color);
            background-color: var(--bg-main);
        }

        /* --- Botones --- */
        button {
            font-family: inherit;
            cursor: pointer;
        }
        .btn-primary {
            background-color: var(--blue-accent);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary {
            background-color: var(--bg-panel);
            color: white;
            border: 1px solid var(--border-color);
            padding: 8px 15px;
            border-radius: 6px;
        }
        .btn-icon-action {
            background: none;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 4px;
        }
        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }
        .btn-icon-action:hover { background-color: rgba(255,255,255,0.1); }

        /* --- Agenda Navegación --- */
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-panel);
            padding: 12px 20px;
            border-radius: 8px 8px 0 0;
            border: 1px solid var(--border-color);
            margin-top: 15px;
        }
        .nav-arrows {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .nav-arrows h3 { margin: 0; font-size: 1.1rem; min-width: 100px; text-align: center; }
        .nav-arrows button { background: none; border: none; color: white; font-size: 1.2rem; }
        
        .nav-actions { display: flex; gap: 10px; }
        .btn-sm {
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            border: none;
            color: white;
        }
        .btn-active { background-color: var(--blue-accent); }

        /* --- Grilla del Calendario --- */
        .calendar-container {
            background-color: var(--bg-calendar);
            border: 1px solid var(--border-color);
            border-top: none;
            border-radius: 0 0 8px 8px;
        }
        .cal-header-row {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-panel);
        }
        .cal-time-col {
            width: 60px;
            border-right: 1px solid var(--border-color);
        }
        .cal-main-col {
            flex: 1;
            text-align: center;
            padding: 10px;
        }
        .cal-main-col strong { display: block; font-size: 0.95rem; }
        .cal-main-col small { color: var(--text-muted); font-size: 0.8rem; }

        .hour-row {
            display: flex;
            height: 60px;
        }
        .hour-label {
            width: 60px;
            text-align: center;
            padding-top: 5px;
            font-size: 0.8rem;
            color: var(--text-muted);
            border-right: 1px dashed var(--border-dashed);
            border-bottom: 1px dashed var(--border-dashed);
            box-sizing: border-box;
        }
        .hour-slot {
            flex: 1;
            border-bottom: 1px dashed var(--border-dashed);
            position: relative;
            padding: 2px;
        }

        /* --- Bloque de Clase --- */
        .class-block {
            background-color: var(--bg-panel);
            border-left: 3px solid var(--blue-accent);
            border-radius: 4px;
            padding: 6px;
            font-size: 0.85rem;
            height: calc(100% - 4px);
            box-sizing: border-box;
            color: white;
            border-top: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid #111;
        }
        .class-block .alumnos { color: var(--text-muted); font-style: italic; display: block; margin-top: 2px;}

        /* --- Solicitudes y Formularios --- */
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        .list-item:last-child { border-bottom: none; }
        .item-details p { margin: 2px 0; font-size: 0.9rem; }
        
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-muted); }
        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-main);
            color: white;
            box-sizing: border-box;
            outline: none;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div id="view-agenda" class="view active">
        <header>
            <div class="greeting">Hola,<br><span class="headerName">Admin</span></div>
            <div class="header-actions">
                <button class="icon-btn" title="Métricas">📊</button>
                <button class="icon-btn" onclick="switchView('view-config')" title="Configuración">⚙️</button>
            </div>
        </header>

        <details class="accordion">
            <summary>Notificaciones</summary>
            <div class="accordion-content">
                <p style="margin:0; color: var(--text-muted);">No hay notificaciones nuevas.</p>
            </div>
        </details>

        <details class="accordion" open>
            <summary>Solicitudes</summary>
            <div class="accordion-content" id="listaSolicitudes" style="padding: 0 15px;">
                </div>
        </details>

        <div style="margin: 20px 0;">
            <button class="btn-primary" onclick="toggleFormClase()">+ Nueva Clase</button>
        </div>

        <div id="form-crear-clase" class="accordion-content" style="display: none; background: var(--bg-panel); border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border-color);">
            <div class="form-row">
                <div class="form-group">
                    <label>Tipo</label>
                    <select id="claseTipo"><option>Individual</option><option>Grupal</option></select>
                </div>
                <div class="form-group">
                    <label>Categoría</label>
                    <select id="claseCategoria">
                        <option>8va</option><option>7ma</option><option>6ta</option><option>5ta</option><option>4ta</option><option>3ra</option><option>2da</option><option>1ra</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Día Fijo</label>
                    <select id="claseDia">
                        <option>Lunes</option><option>Martes</option><option>Miércoles</option><option>Jueves</option><option>Viernes</option><option>Sábado</option><option>Domingo</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Horario</label>
                    <select id="claseHora">
                        <option>08:00</option><option>09:00</option><option>10:00</option><option>11:00</option><option>12:00</option><option>13:00</option><option>14:00</option><option>15:00</option><option>16:00</option><option>17:00</option><option>18:00</option><option>19:00</option><option>20:00</option><option>21:00</option><option>22:00</option>
                    </select>
                </div>
            </div>
            <button class="btn-primary" onclick="crearClase()">Guardar Clase</button>
            <button class="btn-secondary" onclick="toggleFormClase()">Cancelar</button>
        </div>

        <div class="calendar-nav">
            <div class="nav-arrows">
                <button onclick="cambiarDia(-1)">❮</button>
                <h3 id="label-dia">HOY</h3>
                <button onclick="cambiarDia(1)">❯</button>
            </div>
            <div class="nav-actions">
                <button class="btn-sm btn-active" onclick="irAHoy()">Hoy</button>
                <button class="btn-sm btn-active" style="background-color: var(--blue-accent);">📅 Calendario</button>
            </div>
        </div>

        <div class="calendar-container">
            <div class="cal-header-row">
                <div class="cal-time-col"></div>
                <div class="cal-main-col">
                    <strong>Clase Fija</strong>
                    <small>Pádel / Tenis</small>
                </div>
            </div>
            <div id="calendar-grid">
                </div>
        </div>
    </div>

    <div id="view-config" class="view">
        <header>
            <div class="greeting">Configuración</div>
            <div class="header-actions">
                <button class="btn-secondary" onclick="switchView('view-agenda')">Volver</button>
            </div>
        </header>

        <div class="accordion" style="padding: 20px;">
            <div class="form-row">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="profNombre" placeholder="Nombre">
                </div>
                <div class="form-group">
                    <label>Apellido</label>
                    <input type="text" id="profApellido" placeholder="Apellido">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Tarifa Individual ($)</label>
                    <input type="number" id="precioInd">
                </div>
                <div class="form-group">
                    <label>Tarifa Grupal ($)</label>
                    <input type="number" id="precioGrup">
                </div>
            </div>
            <button class="btn-primary" onclick="guardarPerfil()">Guardar Cambios</button>
        </div>
    </div>

</div>

<script>
    let perfil = JSON.parse(localStorage.getItem('profPerfil')) || { nombre: 'Admin', apellido: '', precioInd: '', precioGrup: '' };
    let clases = JSON.parse(localStorage.getItem('profClasesFijas')) || [];
    let solicitudes = JSON.parse(localStorage.getItem('profSolicitudes')) || [
        { id: 1, alumno: 'Carlos', tipo: 'Grupal', dia: 'Martes', hora: '18:00', estado: 'Pendiente' }
    ];

    const nombresDias = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
    let fechaMostrada = new Date(); // Usamos Date real para poder saber cuándo es "HOY"

    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
    }

    function toggleFormClase() {
        const form = document.getElementById('form-crear-clase');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    function cargarPerfil() {
        document.getElementById('profNombre').value = perfil.nombre;
        document.getElementById('profApellido').value = perfil.apellido;
        document.getElementById('precioInd').value = perfil.precioInd;
        document.getElementById('precioGrup').value = perfil.precioGrup;
        document.querySelectorAll('.headerName').forEach(el => el.innerText = perfil.nombre || 'Admin');
    }

    function guardarPerfil() {
        perfil = {
            nombre: document.getElementById('profNombre').value,
            apellido: document.getElementById('profApellido').value,
            precioInd: document.getElementById('precioInd').value,
            precioGrup: document.getElementById('precioGrup').value,
        };
        localStorage.setItem('profPerfil', JSON.stringify(perfil));
        cargarPerfil();
        switchView('view-agenda');
    }

    function cambiarDia(offset) {
        fechaMostrada.setDate(fechaMostrada.getDate() + offset);
        renderizarCalendario();
    }

    function irAHoy() {
        fechaMostrada = new Date();
        renderizarCalendario();
    }

    function renderizarCalendario() {
        const hoy = new Date();
        const esHoy = fechaMostrada.toDateString() === hoy.toDateString();
        const diaNombre = nombresDias[fechaMostrada.getDay()];
        
        document.getElementById('label-dia').innerText = esHoy ? 'HOY' : diaNombre.toUpperCase();
        
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        
        const horas = ['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00','22:00'];

        horas.forEach(hora => {
            let claseEncontrada = clases.find(c => c.dia === diaNombre && c.hora === hora);
            let contenidoCelda = '';

            if(claseEncontrada) {
                let alumnosText = claseEncontrada.alumnos.length > 0 
                                  ? claseEncontrada.alumnos.join(', ') 
                                  : 'Libre';

                contenidoCelda = `
                    <div class="class-block">
                        <strong>${claseEncontrada.tipo} - ${claseEncontrada.categoria}</strong>
                        <span class="alumnos">👤 ${alumnosText}</span>
                    </div>
                `;
            }

            grid.innerHTML += `
                <div class="hour-row">
                    <div class="hour-label">${hora}</div>
                    <div class="hour-slot">${contenidoCelda}</div>
                </div>
            `;
        });
    }

    function crearClase() {
        const tipo = document.getElementById('claseTipo').value;
        const categoria = document.getElementById('claseCategoria').value;
        const dia = document.getElementById('claseDia').value;
        const hora = document.getElementById('claseHora').value;

        if(clases.some(c => c.dia === dia && c.hora === hora)) {
            alert('Ya tenés una clase fija asignada en ese horario.');
            return;
        }

        clases.push({ id: Date.now(), tipo, categoria, club: 'Asignado', dia, hora, alumnos: [] });
        localStorage.setItem('profClasesFijas', JSON.stringify(clases));
        
        renderizarCalendario();
        toggleFormClase();
    }

    function renderizarSolicitudes() {
        const contenedor = document.getElementById('listaSolicitudes');
        contenedor.innerHTML = '';
        const pendientes = solicitudes.filter(s => s.estado === 'Pendiente');

        if(pendientes.length === 0) {
            contenedor.innerHTML = '<p style="color: var(--text-muted); padding: 15px 0;">No hay solicitudes pendientes.</p>';
            return;
        }

        pendientes.forEach(sol => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `
                <div class="item-details">
                    <p><strong>${sol.alumno}</strong></p>
                    <p style="color: var(--text-muted);">${sol.tipo} - ${sol.dia} a las ${sol.hora}</p>
                </div>
                <div>
                    <button class="btn-icon-action text-success" onclick="gestionarSolicitud(${sol.id}, 'Aceptada')" title="Aceptar">✓</button>
                    <button class="btn-icon-action text-danger" onclick="gestionarSolicitud(${sol.id}, 'Rechazada')" title="Rechazar">✗</button>
                </div>
            `;
            contenedor.appendChild(div);
        });
    }

    function gestionarSolicitud(id, estado) {
        let solicitud = solicitudes.find(s => s.id === id);
        if(solicitud && estado === 'Aceptada') {
            let claseExistente = clases.find(c => c.dia === solicitud.dia && c.hora === solicitud.hora);
            if(claseExistente) {
                if(!claseExistente.alumnos.includes(solicitud.alumno)){
                    claseExistente.alumnos.push(solicitud.alumno);
                }
            } else {
                clases.push({
                    id: Date.now(), tipo: solicitud.tipo, categoria: 'A definir', club: 'A confirmar',
                    dia: solicitud.dia, hora: solicitud.hora, alumnos: [solicitud.alumno]
                });
            }
            localStorage.setItem('profClasesFijas', JSON.stringify(clases));
            renderizarCalendario();
        }
        solicitudes = solicitudes.filter(s => s.id !== id);
        localStorage.setItem('profSolicitudes', JSON.stringify(solicitudes));
        renderizarSolicitudes();
    }

    // Inicializar
    cargarPerfil();
    renderizarCalendario();
    renderizarSolicitudes();
</script>
</body>
</html>
